<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Act Compliance Calculator</title>

  <!-- jsPDF for PDF generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #F8FAFC;
      margin: 0;
      padding: 0;
    }

    .calculator-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 40px;
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    }

    h1, h2 {
      color: #1B4E8C;
      text-align: center;
    }

    .question {
      margin-bottom: 30px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 10px;
    }

    select {
      width: 100%;
      padding: 10px;
      border: 2px solid #1B4E8C;
      border-radius: 6px;
    }

    #resultBox {
      background: #E7F1FB;
      border-left: 6px solid #1B4E8C;
      padding: 20px;
      margin-top: 30px;
      display: none;
      border-radius: 8px;
    }

    .cta-btn {
      background: #1B4E8C;
      color: white;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
    }

    .download-btn {
      background: #2E8C6A;
      color: white;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 20px;
      display: none;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="calculator-container">
  <h1>AI Act Compliance Calculator</h1>
  <p style="text-align:center;">
    Find out in under a minute which risk category your AI system likely belongs to.
  </p>

  <h2>Answer the 6 questions</h2>

  <div class="question">
    <label>1. Does the AI system make or influence decisions about individuals?</label>
    <select id="q1">
      <option value="0">No</option>
      <option value="2">Yes, autonomously</option>
      <option value="1">Yes, with human oversight</option>
    </select>
  </div>

  <div class="question">
    <label>2. Is the system used in a high-risk domain (employment, education, healthcare, law enforcement, public sector)?</label>
    <select id="q2">
      <option value="0">No</option>
      <option value="2">Yes</option>
    </select>
  </div>

  <div class="question">
    <label>3. Does the system use biometric identification or categorisation?</label>
    <select id="q3">
      <option value="0">No</option>
      <option value="3">Yes, real-time</option>
      <option value="2">Yes, non-real-time</option>
    </select>
  </div>

  <div class="question">
    <label>4. Is the model a generative AI system?</label>
    <select id="q4">
      <option value="0">No</option>
      <option value="1">Yes, internal use</option>
      <option value="2">Yes, external use</option>
    </select>
  </div>

  <div class="question">
    <label>5. Is the output used to determine rights, opportunities or obligations?</label>
    <select id="q5">
      <option value="0">No</option>
      <option value="2">Yes</option>
    </select>
  </div>

  <div class="question">
    <label>6. Is human oversight built in?</label>
    <select id="q6">
      <option value="0">Yes</option>
      <option value="2">No</option>
    </select>
  </div>

  <button class="cta-btn" onclick="calculate()">Calculate Risk Category</button>

  <div id="resultBox">
    <h3>Result</h3>
    <p id="resultText"></p>
  </div>

  <button class="download-btn" id="downloadBtn" onclick="generatePDF()">Download your report</button>
</div>


<script>
function calculate() {
  let score =
    parseInt(q1.value) +
    parseInt(q2.value) +
    parseInt(q3.value) +
    parseInt(q4.value) +
    parseInt(q5.value) +
    parseInt(q6.value);

  let riskClass = "";
  let explanation = "";

  if (score >= 7) {
    riskClass = "HIGH-RISK AI";
    explanation = "Obligations include: risk assessment, data quality documentation, logging, transparency, human oversight.";
  } else if (score >= 3) {
    riskClass = "LIMITED-RISK AI";
    explanation = "Obligations include: transparency and user information.";
  } else {
    riskClass = "MINIMAL-RISK AI";
    explanation = "No legal obligations — but periodic governance review recommended.";
  }

  document.getElementById("resultText").innerHTML =
    "<strong>Likely classification: " + riskClass + "</strong><br><br>" + explanation;

  document.getElementById("resultBox").style.display = "block";
  document.getElementById("downloadBtn").style.display = "block";

  window.calculatedRisk = riskClass;
}

async function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(20);
  doc.setTextColor(30, 70, 140);
  doc.text("AI Act Compliance Report", 14, 20);

  doc.setFontSize(12);
  doc.setTextColor(0,0,0);
  doc.text("Generated by Dutch Governance Advisory", 14, 30);

  doc.setFontSize(14);
  doc.setTextColor(30,70,140);
  doc.text("Risk Category:", 14, 45);

  doc.setFontSize(12);
  doc.text(window.calculatedRisk, 14, 53);

  doc.setFontSize(14);
  doc.text("Your Answers:", 14, 70);

  doc.setFontSize(12);
  doc.text("Q1: " + q1.options[q1.selectedIndex].text, 14, 80);
  doc.text("Q2: " + q2.options[q2.selectedIndex].text, 14, 88);
  doc.text("Q3: " + q3.options[q3.selectedIndex].text, 14, 96);
  doc.text("Q4: " + q4.options[q4.selectedIndex].text, 14, 104);
  doc.text("Q5: " + q5.options[q5.selectedIndex].text, 14, 112);
  doc.text("Q6: " + q6.options[q6.selectedIndex].text, 14, 120);

  const date = new Date().toLocaleDateString("en-GB");
  doc.setFontSize(10);
  doc.text("Date: " + date, 14, 140);
  doc.text("Contact: bas@dutchgovernanceadvisory.nl", 14, 148);

  doc.save("AI_Act_Compliance_Report.pdf");
}
</script>

</body>
</html>
