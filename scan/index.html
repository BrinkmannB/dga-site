<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Afhankelijkheidsscan</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b1320;
  color:#e8edf5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  max-width:720px;
  width:100%;
  padding:40px;
}

.progress{
  color:#8fa0b3;
  font-size:14px;
  margin-bottom:10px;
}

.intro{
  color:#8fa0b3;
  font-size:14px;
  margin-bottom:30px;
  line-height:1.6;
}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:30px;
  line-height:1.35;
  margin-bottom:30px;
}

.options label{
  display:block;
  margin-bottom:16px;
  cursor:pointer;
  color:#8fa0b3;
  padding:12px 14px;
  border-radius:6px;
  transition:all 0.2s ease;
}

.options label:hover{
  background:rgba(255,255,255,0.03);
  color:#e8edf5;
}

.options input{
  margin-right:10px;
}

button{
  margin-top:30px;
  padding:14px 24px;
  border:1px solid #c9a96e;
  background:none;
  color:#e8edf5;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.3s ease;
}

button:hover{
  background:#c9a96e;
  color:#0b1320;
}

button:disabled{
  opacity:0.3;
  cursor:not-allowed;
}

.trigger{
  margin-top:20px;
  color:#c9a96e;
  font-size:14px;
  min-height:20px;
}

</style>
</head>

<body>

<div class="container">

  <div class="progress">
    Vraag <span id="step">1</span> van 5
  </div>

  <div class="intro">
    De meeste organisaties kennen hun digitale afhankelijkheid niet.<br>
    Niet omdat zij nalatig zijn — maar omdat deze zich cumulatief opbouwt.<br><br>
    Deze scan maakt zichtbaar in hoeverre uw organisatie nog zelfstandig kan handelen.
  </div>

  <h1 id="question"></h1>

  <div class="options" id="options"></div>

  <button id="nextBtn" onclick="next()" disabled>
    Volgende
  </button>

  <div class="trigger" id="trigger"></div>

</div>

<script>

const questions = [

{
q: "Kunt u binnen 12 maanden één kritische digitale leverancier vervangen<br>zonder verstoring van uw primaire proces?",
a: [
{t:"Ja, aantoonbaar en getest", v:0},
{t:"In theorie mogelijk", v:1},
{t:"Alleen met significante impact", v:2},
{t:"Nee / onbekend", v:3}
]
},

{
q: "Is uw kern data volledig overdraagbaar naar een alternatief systeem<br>zonder functioneel verlies?",
a: [
{t:"Ja, volledig en gevalideerd", v:0},
{t:"Grotendeels overdraagbaar", v:1},
{t:"Alleen met conversie/verlies", v:2},
{t:"Nee / onbekend", v:3}
]
},

{
q: "Heeft u inzicht in de langetermijnkosten (5+ jaar)<br>van uw huidige digitale keuzes?",
a: [
{t:"Ja, integraal en scenario-gebaseerd", v:0},
{t:"Redelijk inzicht", v:1},
{t:"Fragmentarisch", v:2},
{t:"Nee / onbekend", v:3}
]
},

{
q: "Worden digitale keuzes op bestuursniveau expliciet afgewogen<br>op afhankelijkheid?",
a: [
{t:"Ja, structureel", v:0},
{t:"Af en toe", v:1},
{t:"Zelden expliciet", v:2},
{t:"Nee", v:3}
]
},

{
q: "Beschikt u over een reëel alternatief<br>voor uw huidige digitale kerninfrastructuur?",
a: [
{t:"Ja, concreet en voorbereid", v:0},
{t:"In theorie", v:1},
{t:"Beperkt", v:2},
{t:"Nee", v:3}
]
}

];

let step = 0;
let score = 0;

function render(){

  document.getElementById('step').innerText = step + 1;
  document.getElementById('question').innerHTML = questions[step].q;

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = "";

  questions[step].a.forEach(opt => {
    const el = document.createElement('label');
    el.innerHTML = `<input type="radio" name="q" value="${opt.v}"> ${opt.t}`;
    el.onclick = () => {
      document.getElementById('nextBtn').disabled = false;
    };
    optionsDiv.appendChild(el);
  });

  // Strategische triggers
  if(step === 1){
    document.getElementById('trigger').innerText =
    "In de praktijk blijkt overdraagbaarheid vaak een aanname.";
  }
  else if(step === 2){
    document.getElementById('trigger').innerText =
    "Kosten ontwikkelen zich zelden lineair — maar cumulatief.";
  }
  else if(step === 3){
    document.getElementById('trigger').innerText =
    "Hier ontstaat vaak het verschil tussen IT en bestuur.";
  }
  else{
    document.getElementById('trigger').innerText = "";
  }

}

function next(){

  const selected = document.querySelector('input[name="q"]:checked');
  if(!selected) return;

  score += parseInt(selected.value);
  step++;

  if(step < questions.length){
    document.getElementById('nextBtn').disabled = true;
    render();
  } else {
    window.location.href = "/scan/result/index.html?score=" + score;
  }

}

render();

</script>

</body>
</html>
