<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uw uitkomst</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b1320;
  color:#e8edf5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  max-width:700px;
  padding:40px;
}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:36px;
  margin-bottom:20px;
}

p{
  color:#8fa0b3;
  line-height:1.6;
}

.cta{
  margin-top:40px;
}

button{
  padding:14px 22px;
  border:1px solid #c9a96e;
  background:none;
  color:#e8edf5;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#c9a96e;
  color:#0b1320;
}

.conversion{
  margin-top:30px;
  font-size:14px;
  color:#c9a96e;
}

</style>
</head>

<body>

<div class="container">

  <h1>Uw uitkomst</h1>

  <p id="resultText"></p>

  <div class="cta">
    <button onclick="location.href='/gesprek'">
      Bespreek dit bestuurlijk
    </button>
  </div>

  <p class="conversion">
    Ik bespreek dit alleen met bestuurders waar dit daadwerkelijk speelt.
  </p>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const score = parseInt(params.get("score"));

let text = "";

if(score <= 2){
  text = "U lijkt controle te hebben. De vraag is of dat werkelijk zo is — of dat risico’s nog niet zichtbaar zijn.";
}
else if(score <= 5){
  text = "Er zijn duidelijke signalen van afhankelijkheid. Deze sturen waarschijnlijk al meer dan zichtbaar is.";
}
else{
  text = "Uw organisatie is waarschijnlijk sterker afhankelijk dan zichtbaar is. Dit is geen IT-risico — dit is een bestuurlijk risico.";
}

document.getElementById("resultText").innerText = text;

</script>

</body>
</html>
