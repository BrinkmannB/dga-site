<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uw uitkomst</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b1320;
  color:#e8edf5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  max-width:720px;
  padding:40px;
}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:38px;
  margin-bottom:30px;
}

.result{
  font-size:18px;
  line-height:1.6;
  color:#d0d7e2;
}

.block{
  margin-top:30px;
  color:#9aa6b2;
}

.cta{
  margin-top:50px;
}

button{
  padding:14px 24px;
  border:1px solid #c9a96e;
  background:none;
  color:#e8edf5;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#c9a96e;
  color:#0b1320;
}

.warning{
  margin-top:30px;
  font-size:14px;
  color:#c9a96e;
}

</style>
</head>

<body>

<div class="container">

  <h1>Uw uitkomst</h1>

  <div class="result" id="resultText"></div>

  <div class="block">
    Afhankelijkheden verdwijnen niet vanzelf.<br>
    Ze bouwen zich op — en beperken uw speelruimte.
  </div>

  <div class="block">
    De meeste bestuurders zien dit pas wanneer het zichtbaar wordt.<br>
    Op dat moment zijn keuzes al beperkt.
  </div>

  <div class="cta">
    <button onclick="location.href='/gesprek'">
      Leg dit op tafel
    </button>
  </div>

  <div class="warning">
    Ik bespreek dit alleen met bestuurders waar dit daadwerkelijk speelt.
  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const score = parseInt(params.get("score"));

let text = "";

if(score <= 2){
  text = "U lijkt controle te hebben.<br><br>De vraag is of dat volledig is — of dat afhankelijkheden nog niet zichtbaar zijn.";
}
else if(score <= 5){
  text = "Uw organisatie heeft beperkte bestuurlijke grip.<br><br>Afhankelijkheden sturen waarschijnlijk al meer dan zichtbaar is.";
}
else{
  text = "U bent waarschijnlijk minder bestuurbaar dan u denkt.<br><br>Afhankelijkheden sturen al mee in uw besluitvorming — zonder dat ze expliciet op tafel liggen.<br><br>Dit is geen IT-vraagstuk.<br>Dit is een bestuurlijk vraagstuk.";
}

document.getElementById("resultText").innerHTML = text;

</script>

</body>
</html>
