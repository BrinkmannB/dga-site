<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Afhankelijkheidsscan</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b1320;
  color:#e8edf5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  max-width:720px;
  width:100%;
  padding:40px;
}

.progress{
  color:#8fa0b3;
  font-size:14px;
  margin-bottom:30px;
}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:32px;
  line-height:1.3;
  margin-bottom:30px;
}

.options label{
  display:block;
  margin-bottom:14px;
  cursor:pointer;
  color:#8fa0b3;
}

.options input{
  margin-right:10px;
}

button{
  margin-top:30px;
  padding:14px 22px;
  border:1px solid #c9a96e;
  background:none;
  color:#e8edf5;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#c9a96e;
  color:#0b1320;
}

.trigger{
  margin-top:20px;
  color:#c9a96e;
  font-size:14px;
}

</style>
</head>

<body>

<div class="container">

  <div class="progress">
    Vraag <span id="step">1</span> van 4
  </div>

  <h1 id="question"></h1>

  <div class="options" id="options"></div>

  <button onclick="next()">Volgende</button>

  <div class="trigger" id="trigger"></div>

</div>

<script>

const questions = [

{
q: "Waar kunt u nog sturen —<br>en waar bent u afhankelijk geworden?",
a: [
{t:"Volledig inzicht", v:0},
{t:"Gedeeltelijk", v:1},
{t:"Onvoldoende inzicht", v:2}
]
},

{
q: "Als één leverancier wegvalt —<br>wat kunt u dan nog zelf bepalen?",
a: [
{t:"Scenario’s zijn helder", v:0},
{t:"Beperkt inzicht", v:1},
{t:"Onbekend", v:2}
]
},

{
q: "Wordt deze afhankelijkheid expliciet besproken —<br>of blijft dit impliciet?",
a: [
{t:"Structureel onderwerp", v:0},
{t:"Af en toe", v:1},
{t:"Niet zichtbaar", v:2}
]
},

{
q: "Kunt u nog van richting veranderen —<br>zonder dat systemen u tegenhouden?",
a: [
{t:"Ja", v:0},
{t:"Beperkt", v:1},
{t:"Nee", v:2}
]
}

];

let step = 0;
let score = 0;

function render(){

  document.getElementById('step').innerText = step + 1;
  document.getElementById('question').innerHTML = questions[step].q;

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = "";

  questions[step].a.forEach(opt => {
    const el = document.createElement('label');
    el.innerHTML = `<input type="radio" name="q" value="${opt.v}"> ${opt.t}`;
    optionsDiv.appendChild(el);
  });

  if(step === 2){
    document.getElementById('trigger').innerText =
    "Hier verliezen de meeste organisaties het overzicht.";
  } else {
    document.getElementById('trigger').innerText = "";
  }

}

function next(){

  const selected = document.querySelector('input[name="q"]:checked');
  if(!selected) return;

  score += parseInt(selected.value);
  step++;

  if(step < questions.length){
    render();
  } else {
    window.location.href = "/scan/result/index.html?score=" + score;
  }

}

render();

</script>

</body>
</html>
