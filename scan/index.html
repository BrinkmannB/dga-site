<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Afhankelijkheidsscan</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b1320;
  color:#e8edf5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  max-width:720px;
  width:100%;
  padding:40px;
}

.progress{
  color:#8fa0b3;
  font-size:14px;
  margin-bottom:10px;
}

.intro{
  color:#8fa0b3;
  font-size:14px;
  margin-bottom:30px;
}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:30px;
  line-height:1.35;
  margin-bottom:30px;
}

.options label{
  display:block;
  margin-bottom:16px;
  cursor:pointer;
  color:#8fa0b3;
  padding:10px 12px;
  border-radius:6px;
  transition:all 0.2s ease;
}

.options label:hover{
  background:rgba(255,255,255,0.03);
  color:#e8edf5;
}

.options input{
  margin-right:10px;
}

button{
  margin-top:30px;
  padding:14px 24px;
  border:1px solid #c9a96e;
  background:none;
  color:#e8edf5;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.3s ease;
}

button:hover{
  background:#c9a96e;
  color:#0b1320;
}

button:disabled{
  opacity:0.3;
  cursor:not-allowed;
}

.trigger{
  margin-top:20px;
  color:#c9a96e;
  font-size:14px;
  min-height:20px;
}

</style>
</head>

<body>

<div class="container">

  <div class="progress">
    Vraag <span id="step">1</span> van 4
  </div>

  <div class="intro">
    4 korte vragen · geen voorbereiding nodig
  </div>

  <h1 id="question"></h1>

  <div class="options" id="options"></div>

  <button id="nextBtn" onclick="next()" disabled>
    Volgende
  </button>

  <div class="trigger" id="trigger"></div>

</div>

<script>

const questions = [

{
q: "Kunt u als bestuur in één overzicht uitleggen<br>van welke leveranciers u afhankelijk bent?",
a: [
{t:"Ja, volledig", v:0},
{t:"Gedeeltelijk", v:1},
{t:"Nee", v:2}
]
},

{
q: "Als morgen een kritische leverancier wegvalt —<br>weet u wat er direct gebeurt?",
a: [
{t:"Ja, scenario’s zijn helder", v:0},
{t:"Beperkt inzicht", v:1},
{t:"Nee", v:2}
]
},

{
q: "Is er één persoon die deze afhankelijkheid<br>als geheel overziet?",
a: [
{t:"Ja", v:0},
{t:"Gedeeltelijk", v:1},
{t:"Nee", v:2}
]
},

{
q: "Wanneer is dit voor het laatst expliciet besproken<br>op bestuurlijk niveau?",
a: [
{t:"Recent en structureel", v:0},
{t:"Af en toe", v:1},
{t:"Niet of nauwelijks", v:2}
]
}

];

let step = 0;
let score = 0;

function render(){

  document.getElementById('step').innerText = step + 1;
  document.getElementById('question').innerHTML = questions[step].q;

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = "";

  questions[step].a.forEach(opt => {
    const el = document.createElement('label');
    el.innerHTML = `<input type="radio" name="q" value="${opt.v}"> ${opt.t}`;
    el.onclick = () => {
      document.getElementById('nextBtn').disabled = false;
    };
    optionsDiv.appendChild(el);
  });

  // Trigger moment eerder in flow
  if(step === 1){
    document.getElementById('trigger').innerText =
    "Hier wordt vaak zichtbaar dat het overzicht ontbreekt.";
  } else {
    document.getElementById('trigger').innerText = "";
  }

}

function next(){

  const selected = document.querySelector('input[name="q"]:checked');
  if(!selected) return;

  score += parseInt(selected.value);
  step++;

  if(step < questions.length){
    document.getElementById('nextBtn').disabled = true;
    render();
  } else {
    // redirect naar resultaatpagina
    window.location.href = "/scan/result/index.html?score=" + score;
  }

}

render();

</script>

</body>
</html>
