<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Contact – Dutch Governance Advisory</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
<header>
  <nav class="topnav">
    <a href="/">Home</a>
    <a href="/diensten">Diensten</a>
    <a href="/over-bas">Over Bas</a>
    <a href="/contact" class="active">Contact</a>
    <span class="lang-switch"><a href="/en/contact">EN</a></span>
  </nav>
</header>

<section class="hero">
  <h1>Contact</h1>
  <p class="subtitle">Neem contact op voor AI-governance advies</p>
</section>

<section class="content">
  <h2>Stel je vraag</h2>
  <p>Gebruik het formulier hieronder. Je bericht komt rechtstreeks binnen via Cloudflare Forms.</p>

  <form method="POST" action="https://formspree.io/f/xqkreqwy" data-cf="true">
    <!-- Cloudflare Forms werkt op HTML-niveau. -->
    
    <label for="name">Naam</label>
    <input type="text" id="name" name="name" required />

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" required />

    <label for="message">Bericht</label>
    <textarea id="message" name="message" rows="6" required></textarea>

    <button type="submit" class="btn-primary">Verstuur</button>
  </form>
</section>

<footer>
  <p>© 2025 Dutch Governance Advisory – AI Governance Consultant Bas Brinkmann</p>
</footer>

</body>
</html>
