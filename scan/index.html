<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Afhankelijkheidsscan</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b1320;
  color:#e8edf5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  max-width:720px;
  width:100%;
  padding:40px;
}

.progress{
  color:#8fa0b3;
  font-size:14px;
  margin-bottom:10px;
}

.intro{
  color:#8fa0b3;
  font-size:14px;
  margin-bottom:30px;
  line-height:1.6;
}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:30px;
  line-height:1.35;
  margin-bottom:30px;
}

.options label{
  display:block;
  margin-bottom:16px;
  cursor:pointer;
  color:#8fa0b3;
  padding:12px 14px;
  border-radius:6px;
  transition:all 0.2s ease;
}

.options label:hover{
  background:rgba(255,255,255,0.03);
  color:#e8edf5;
}

.options input{
  margin-right:10px;
}

button{
  margin-top:30px;
  padding:14px 24px;
  border:1px solid #c9a96e;
  background:none;
  color:#e8edf5;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.3s ease;
}

button:hover{
  background:#c9a96e;
  color:#0b1320;
}

button:disabled{
  opacity:0.3;
  cursor:not-allowed;
}

.trigger{
  margin-top:20px;
  color:#c9a96e;
  font-size:14px;
  min-height:20px;
}

</style>
</head>

<body>

<div class="container">

  <div class="progress">
    Vraag <span id="step">1</span> van 5
  </div>

  <div class="intro">
    De meeste organisaties denken dat ze controle hebben over hun digitale omgeving.<br>
    In de praktijk blijkt die controle zelden getest.<br><br>
    Deze scan maakt zichtbaar in hoeverre uw organisatie nog zelfstandig kan handelen.
  </div>

  <h1 id="question"></h1>

  <div class="options" id="options"></div>

  <button id="nextBtn" onclick="next()" disabled>
    Volgende
  </button>

  <div class="trigger" id="trigger"></div>

</div>

<script>

const questions = [

{
q: "Welk proces binnen uw organisatie stopt volledig<br>als morgen uw primaire systeem uitvalt?",
a: [
{t:"Dat weten we exact en hebben we getest", v:0},
{t:"Dat weten we globaal", v:1},
{t:"Dat vermoeden we", v:2},
{t:"Dat weten we niet", v:3}
]
},

{
q: "Als uw kernsysteem (bijv. CRM) uitvalt,<br>kunt u uw operatie voortzetten zonder dataverlies?",
a: [
{t:"Ja, aantoonbaar en getest", v:0},
{t:"Met beperkte verstoring", v:1},
{t:"Alleen met significante impact", v:2},
{t:"Nee / onbekend", v:3}
]
},

{
q: "In hoeverre is uw kern data direct overdraagbaar<br>naar een alternatief systeem zonder verlies?",
a: [
{t:"Volledig overdraagbaar en gevalideerd", v:0},
{t:"Grotendeels overdraagbaar", v:1},
{t:"Alleen met conversie/verlies", v:2},
{t:"Niet realistisch", v:3}
]
},

{
q: "Wanneer is voor het laatst concreet getest<br>of u een kritische leverancier kunt vervangen?",
a: [
{t:"Recent getest en gevalideerd", v:0},
{t:"Scenario uitgewerkt maar niet getest", v:1},
{t:"Alleen theoretisch besproken", v:2},
{t:"Nog nooit", v:3}
]
},

{
q: "Worden afhankelijkheden expliciet besproken<br>op bestuursniveau bij strategische keuzes?",
a: [
{t:"Structureel en aantoonbaar", v:0},
{t:"Regelmatig", v:1},
{t:"Incidenteel", v:2},
{t:"Nee", v:3}
]
}

];

let step = 0;
let score = 0;

function render(){

  document.getElementById('step').innerText = step + 1;
  document.getElementById('question').innerHTML = questions[step].q;

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = "";

  questions[step].a.forEach(opt => {
    const el = document.createElement('label');
    el.innerHTML = `<input type="radio" name="q" value="${opt.v}"> ${opt.t}`;
    el.onclick = () => {
      document.getElementById('nextBtn').disabled = false;
    };
    optionsDiv.appendChild(el);
  });

  const trigger = document.getElementById('trigger');

  if(step === 0){
    trigger.innerText = "De meeste organisaties kunnen dit niet concreet beantwoorden.";
  }
  else if(step === 1){
    trigger.innerText = "‘Beperkte verstoring’ blijkt in de praktijk vaak optimistisch.";
  }
  else if(step === 2){
    trigger.innerText = "Overdraagbaarheid wordt vaak aangenomen, zelden getest.";
  }
  else if(step === 3){
    trigger.innerText = "Hier ontstaat afhankelijkheid die vrijwel nooit wordt teruggedraaid.";
  }
  else if(step === 4){
    trigger.innerText = "Dit onderscheidt operationele realiteit van bestuurlijke aanname.";
  }

}

function next(){

  const selected = document.querySelector('input[name="q"]:checked');
  if(!selected) return;

  score += parseInt(selected.value);
  step++;

  if(step < questions.length){
    document.getElementById('nextBtn').disabled = true;
    render();
  } else {

    // 🔥 MICRO-CONVERSIE MOMENT
    const proceed = confirm(
      "Wilt u een korte verdiepende analyse waarin we deze afhankelijkheid concreet maken voor uw organisatie?"
    );

    if(proceed){
      window.location.href = "/plan-sessie";
    } else {
      window.location.href = "/scan/result/index.html?score=" + score;
    }

  }

}

render();

</script>

</body>
</html>
