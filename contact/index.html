<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan een gesprek | Dutch Governance Advisory</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #061622;
    color: #e4f4f8;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.wrapper {
    max-width: 720px;
    width: 100%;
    padding: 40px;
}

h1 {
    font-family: 'Libre Baskerville', serif;
    font-size: 42px;
    font-weight: 400;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    color: #87a3b3;
    margin-bottom: 30px;
}

input, textarea {
    width: 100%;
    padding: 16px;
    margin-bottom: 15px;
    background: #0c2433;
    border: none;
    color: white;
    font-size: 16px;
}

textarea {
    min-height: 120px;
}

button {
    width: 100%;
    padding: 16px;
    background: #c6a662;
    border: none;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">
    <h1>Plan een gesprek</h1>
    <p>Als dit bestuurlijk relevant is, spreken we elkaar.</p>

    <form id="contact-form" action="https://formspree.io/f/xyklkkvq" method="POST">

        <input type="text" name="name" placeholder="Naam" required>
        <input type="text" name="organization" placeholder="Organisatie" required>
        <input type="email" name="email" placeholder="E-mailadres" required>

        <textarea name="message" placeholder="Wat speelt er bij u?"></textarea>

        <!-- hidden velden -->
        <input type="hidden" name="score" id="scoreField">
        <input type="hidden" name="zone" id="zoneField">

        <button type="submit">Bespreek mijn situatie</button>
    </form>
</div>

<script>
// Form submit (controle bij jou houden)
const form = document.getElementById("contact-form");

form.addEventListener("submit", async function (e) {
    e.preventDefault();

    const data = new FormData(form);

    await fetch(form.action, {
        method: "POST",
        body: data,
        headers: {
            'Accept': 'application/json'
        }
    });

    window.location.href = "/contact/bedankt/";
});

// Score ophalen (als aanwezig)
document.addEventListener("DOMContentLoaded", function () {
    const score = localStorage.getItem("scanScore");
    const zone = localStorage.getItem("scanZone");

    if (score) {
        document.getElementById("scoreField").value = score + "/60";
    }

    if (zone) {
        document.getElementById("zoneField").value = zone;
    }
});
</script>

</body>
</html>
