<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Dutch Governance Advisory</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Georgia, serif;
  background:#051622;
  color:#eef4f8;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.wrapper{
  max-width:720px;
  padding:40px;
}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:42px;
  font-weight:400;
  margin-bottom:20px;
}

p{
  font-size:18px;
  color:#b7c3cf;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  background:#0c2433;
  border:none;
  color:white;
}

button{
  width:100%;
  padding:16px;
  background:#c6a662;
  border:none;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>Plan een gesprek</h1>

<p>
Als dit bestuurlijk relevant is, spreken we elkaar.
</p>

<form action="https://formspree.io/f/xyklkkvq" method="POST">

  <input type="text" name="name" placeholder="Naam" required>
  <input type="text" name="organization" placeholder="Organisatie" required>
  <input type="email" name="email" placeholder="E-mailadres" required>

  <textarea name="message" placeholder="Wat speelt er bij u?"></textarea>

  <!-- 🔥 CRUCIAAL -->
  <input type="hidden" name="_next" value="https://dutchgovernanceadvisory.nl/contact/bedankt/">
  <button type="submit">Bespreek mijn situatie</button>

</form>

</div>

<script>
const form = document.querySelector("form");

form.addEventListener("submit", function () {
  setTimeout(function () {
    window.location.href = "/contact/bedankt/";
  }, 300);
});
</script>

</body>
</html>
