<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uw bestuurlijke risicobeeld | Dutch Governance Advisory</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#051622;
  --panel:#0b1e2d;
  --text:#eef4f8;
  --muted:#b7c3cf;
  --line:#294156;
  --accent:#c6a662;
  --danger:#ff8b84;
  --warn:#f2bf67;
  --ok:#95d39a;
}

body{
  margin:0;
  font-family:Georgia, serif;
  background:linear-gradient(180deg,#04101a 0%, #051622 100%);
  color:var(--text);
  line-height:1.85;
}

.wrapper{
  max-width:1100px;
  margin:0 auto;
  padding:60px 24px 100px;
}

.tag{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:18px;
}

.red{color:var(--danger); border:1px solid var(--danger);}
.orange{color:var(--warn); border:1px solid var(--warn);}
.green{color:var(--ok); border:1px solid var(--ok);}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:54px;
  font-weight:400;
  margin-bottom:14px;
  line-height:1.05;
}

.score{
  color:var(--muted);
  margin-bottom:24px;
}

.lead{
  font-size:22px;
  margin-bottom:26px;
  color:var(--muted);
}

p{
  font-size:18px;
  color:var(--muted);
  margin-bottom:18px;
}

.card{
  background:rgba(255,255,255,.02);
  border:1px solid var(--line);
  border-radius:20px;
  padding:26px;
  margin-top:30px;
}

.card strong{color:var(--text)}

.cta{
  margin-top:34px;
  padding:24px;
  background:rgba(198,166,98,.08);
  border:1px solid rgba(198,166,98,.35);
  border-radius:16px;
}

.button{
  display:inline-block;
  margin-top:14px;
  padding:14px 22px;
  background:var(--accent);
  color:#071521;
  text-decoration:none;
  border-radius:12px;
  font-weight:bold;
}

.sub{
  font-size:14px;
  color:#8fa2b5;
  margin-top:10px;
}

.blocks{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  margin-top:46px;
}

.block{
  border:1px solid var(--line);
  padding:18px;
  border-radius:14px;
  background:rgba(255,255,255,.015);
}

.block h3{
  font-family:'Libre Baskerville', serif;
  font-weight:400;
  margin-bottom:6px;
}

@media(max-width:900px){
  .blocks{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrapper">

<div id="result"></div>

<div class="blocks">
  <div class="block">
    <h3>Zicht</h3>
    <p>Wat impliciet is, wordt niet bestuurd.</p>
  </div>
  <div class="block">
    <h3>Duiding</h3>
    <p>Losse keuzes vormen samen één afhankelijkheid.</p>
  </div>
  <div class="block">
    <h3>Regie</h3>
    <p>Besturen is ruimte houden om opnieuw te kiezen.</p>
  </div>
</div>

</div>

<script>
const score = parseInt(localStorage.getItem("scanScore"));
const zone = localStorage.getItem("scanZone");

// fallback
if (!score || !zone) {
  document.body.innerHTML = "<p style='padding:40px;'>Doe eerst de scan.</p>";
}

// kleine personalisatie (optioneel later uitbreiden)
let nuance = "";
if (score <= 30) nuance = "sterk";
else if (score <= 40) nuance = "duidelijk";
else if (score <= 50) nuance = "subtiel";
else nuance = "beperkt";

let html = "";

// 🔴 ROOD
if (zone === "red") {
html = `
<div class="tag red">Rood — bestuurlijke kwetsbaarheid</div>

<h1>Dit beperkt uw strategische ruimte al ${nuance}</h1>
<div class="score">Score: ${score} / 60</div>

<p class="lead">
De uitkomst suggereert dat digitale afhankelijkheid geen randverschijnsel meer is, maar een factor die uw bestuurlijke handelingsruimte direct beïnvloedt.
</p>

<p>
Wat dit verraderlijk maakt: het voelt vaak nog werkbaar. Systemen draaien, leveranciers leveren, processen lopen.
</p>

<p>
Maar onder de oppervlakte ontstaat een situatie waarin keuzes niet meer volledig vrij zijn — en dat is precies waar afhankelijkheid bestuurlijk wordt.
</p>

<div class="card">
<p><strong>Bestuurlijke observatie:</strong> afhankelijkheid is niet meer incidenteel, maar onderdeel van de structuur geworden.</p>
</div>

<div class="cta">
<p><strong>Dit vraagt geen optimalisatie. Dit vraagt richting.</strong></p>
<p>Breng afhankelijkheid terug tot bestuurlijke keuzes voordat ruimte verder verdwijnt.</p>
<a href="/contact/" class="button">Plan een eerste gesprek</a>
<div class="sub">Geen intake · geen verkoop · wel directe duiding</div>
</div>
`;
}

// 🟠 ORANJE
if (zone === "orange") {
html = `
<div class="tag orange">Oranje — oplopende afhankelijkheid</div>

<h1>Hier begint afhankelijkheid structureel te worden</h1>
<div class="score">Score: ${score} / 60</div>

<p class="lead">
Uw organisatie functioneert — maar de samenhang tussen keuzes, leveranciers en systemen wordt bestuurlijk minder scherp.
</p>

<p>
Dit is de fase waarin afhankelijkheid zich normaliseert. Niet zichtbaar als probleem, maar wel voelbaar in beperkingen.
</p>

<p>
Juist hier worden tijdelijke keuzes structureel — zonder expliciete bestuurlijke afweging.
</p>

<div class="card">
<p><strong>Bestuurlijke observatie:</strong> afhankelijkheid groeit zonder dat zij als één geheel wordt gezien.</p>
</div>

<div class="cta">
<p><strong>Dit is het moment om scherp te worden.</strong></p>
<p>Maak zichtbaar wat impliciet is — en voorkom dat afhankelijkheid vanzelfsprekend wordt.</p>
<a href="/contact/" class="button">Bespreek uw uitkomst</a>
<div class="sub">Juist nu is er nog ruimte om zonder druk te sturen</div>
</div>
`;
}

// 🟢 GROEN
if (zone === "green") {
html = `
<div class="tag green">Groen — relatief bestuurbaar</div>

<h1>Er is zicht — maar dat is geen eindpunt</h1>
<div class="score">Score: ${score} / 60</div>

<p class="lead">
Uw organisatie lijkt digitale afhankelijkheid in zekere mate te overzien en te sturen.
</p>

<p>
Dat is waardevol — maar kwetsbaarheid ontstaat zelden door één fout. Meestal door het langzaam verdwijnen van aandacht.
</p>

<p>
Wat vandaag bestuurbaar is, kan morgen impliciet worden.
</p>

<div class="card">
<p><strong>Bestuurlijke observatie:</strong> bestuurbaarheid vraagt actief onderhoud.</p>
</div>

<div class="cta">
<p><strong>Borg wat nu werkt.</strong></p>
<p>Toets aannames en voorkom dat grip ongemerkt afneemt.</p>
<a href="/contact/" class="button">Plan reflectiegesprek</a>
<div class="sub">Sterke posities blijven sterk door discipline</div>
</div>
`;
}

document.getElementById("result").innerHTML = html;
</script>

</body>
</html>
