<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dutch Governance Advisory | Understanding Strategic Autonomy</title>

<meta name="description" content="Dutch Governance Advisory exists to understand how dependency accumulates and how strategic autonomy can be preserved.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#08111d;
--surface:#101a2b;
--surface-2:#162235;
--accent:#c8a46a;
--text:#eef2f7;
--muted:#9aa8b8;
--border:rgba(255,255,255,.08);
--max-width:1200px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.8;
}

.container{
width:min(92%,var(--max-width));
margin:auto;
}

section{
padding:120px 0;
}

h1,h2,h3{
font-family:'Libre Baskerville',serif;
font-weight:400;
}

h1{
font-size:clamp(3rem,7vw,6rem);
line-height:1.05;
margin-bottom:24px;
}

h2{
font-size:clamp(2rem,4vw,3.5rem);
margin-bottom:32px;
}

h3{
font-size:1.25rem;
margin-bottom:16px;
}

p{
margin-bottom:20px;
color:#d8e0ea;
}

.small{
font-size:.9rem;
letter-spacing:2px;
text-transform:uppercase;
color:var(--accent);
margin-bottom:24px;
}

.lead{
font-size:1.3rem;
color:var(--muted);
max-width:850px;
}

nav{
position:sticky;
top:0;
z-index:100;
background:rgba(8,17,29,.95);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
}

.nav-inner{
display:flex;
justify-content:space-between;
align-items:center;
padding:24px 0;
}

.logo{
font-weight:600;
font-size:1.1rem;
}

.logo span{
color:var(--accent);
}

.nav-links{
display:flex;
gap:32px;
}

.nav-links a{
text-decoration:none;
color:var(--muted);
transition:.3s;
}

.nav-links a:hover{
color:white;
}

.hero{
min-height:90vh;
display:flex;
align-items:center;
}

.hero-content{
max-width:900px;
}

.buttons{
margin-top:40px;
display:flex;
gap:16px;
flex-wrap:wrap;
}

.btn{
padding:14px 28px;
border-radius:10px;
text-decoration:none;
transition:.3s;
}

.btn-primary{
background:var(--accent);
color:#08111d;
font-weight:600;
}

.btn-secondary{
border:1px solid var(--border);
color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:24px;
}

.card{
background:var(--surface);
border:1px solid var(--border);
padding:32px;
border-radius:18px;
}

.card p{
margin-bottom:0;
}

.framework{
text-align:center;
font-size:1.4rem;
line-height:2.2;
}

.quote{
max-width:900px;
font-size:1.4rem;
font-family:'Libre Baskerville',serif;
border-left:3px solid var(--accent);
padding-left:30px;
color:#dfe7f1;
}

footer{
border-top:1px solid var(--border);
padding:80px 0;
text-align:center;
}

footer p{
color:var(--muted);
}

@media(max-width:768px){

.nav-links{
display:none;
}

section{
padding:80px 0;
}

}

</style>

</head>
<body>

<nav>
<div class="container nav-inner">

<div class="logo">
Dutch Governance <span>Advisory</span>
</div>

<div class="nav-links">
<a href="#question">Question</a>
<a href="#observations">Observations</a>
<a href="#mechanisms">Mechanisms</a>
<a href="#framework">Framework</a>
<a href="#conversation">Conversation</a>
</div>

</div>
</nav>
