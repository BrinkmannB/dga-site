<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verken dit in uw context</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b1320;
  color:#e8edf5;
}

.container{
  max-width:720px;
  margin:auto;
  padding:120px 24px;
}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:36px;
  margin-bottom:24px;
}

p{
  color:#9aa6b2;
  font-size:17px;
  margin-bottom:16px;
}

.highlight{
  color:#e8edf5;
}

input, textarea{
  width:100%;
  padding:14px;
  margin-top:12px;
  background:#111a2b;
  border:1px solid rgba(255,255,255,0.1);
  color:#fff;
  border-radius:8px;
}

button{
  margin-top:20px;
  padding:14px 22px;
  border:1px solid #c9a96e;
  background:none;
  color:#c9a96e;
  cursor:pointer;
}

button:hover{
  background:#c9a96e;
  color:#0b1320;
}

.small{
  margin-top:10px;
  font-size:14px;
  color:#6f7b88;
}

</style>
</head>

<body>

<div class="container">

  <h1>Kort verkennen waar dit bij u speelt</h1>

  <p>Dit is geen intake. Geen adviesgesprek.</p>

  <p class="highlight">
    Alleen scherp krijgen of en waar dit vraagstuk bij u speelt.
  </p>

  <form action="https://formspree.io/f/xyklkkvq" method="POST">

  <input type="hidden" name="_next" value="https://dutchgovernanceadvisory.nl/contact/bedankt/">

  <input type="hidden" name="_subject" value="Nieuwe aanvraag DGA">

  <input type="text" name="name" placeholder="Naam" required>
  <input type="email" name="email" placeholder="E-mail" required>
  <textarea name="message" rows="4" placeholder="Korte toelichting (optioneel)"></textarea>

  <button type="submit">
    Verken dit in uw context →
  </button>

</form>
    <div class="small">
      U ontvangt binnen korte tijd een reactie.
    </div>



</div>

</body>
</html>
