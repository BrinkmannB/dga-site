<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Afhankelijkheidsscan</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0b1320;
  color:#e8edf5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  max-width:700px;
  width:100%;
  padding:40px;
}

h1{
  font-family:'Libre Baskerville', serif;
  font-size:34px;
  line-height:1.3;
  margin-bottom:20px;
}

.progress{
  color:#8fa0b3;
  font-size:14px;
  margin-bottom:30px;
}

.question{
  margin-bottom:30px;
}

.options label{
  display:block;
  margin-bottom:12px;
  cursor:pointer;
  color:#8fa0b3;
}

button{
  margin-top:20px;
  padding:12px 18px;
  border:1px solid #c9a96e;
  background:none;
  color:#e8edf5;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#c9a96e;
  color:#0b1320;
}

.mid-trigger{
  margin-top:20px;
  color:#c9a96e;
  font-size:14px;
}

</style>
</head>

<body>

<div class="container">

  <div class="progress">
    Vraag <span id="step">1</span> van 4
  </div>

  <h1 id="question"></h1>

  <div class="options" id="options"></div>

  <button onclick="next()">Volgende</button>

  <p class="mid-trigger" id="trigger"></p>

</div>

<script>

const questions = [

{
q: "U neemt besluiten over leveranciers.<br>Maar weet u waar u niet meer zonder kunt?",
a: [
{t:"Ja, volledig inzicht", v:0},
{t:"Gedeeltelijk", v:1},
{t:"Nee", v:2}
]
},

{
q: "Als één kritische leverancier wegvalt — weet u wat er gebeurt?",
a: [
{t:"Scenario’s zijn uitgewerkt", v:0},
{t:"Beperkt inzicht", v:1},
{t:"Onbekend", v:2}
]
},

{
q: "Worden digitale afhankelijkheden expliciet besproken in de boardroom?",
a: [
{t:"Structureel", v:0},
{t:"Af en toe", v:1},
{t:"Nee", v:2}
]
},

{
q: "Kunt u nog van koers veranderen zonder grote afhankelijkheidskosten?",
a: [
{t:"Ja", v:0},
{t:"Beperkt", v:1},
{t:"Nee", v:2}
]
}

];

let step = 0;
let score = 0;

function render(){

  document.getElementById('step').innerText = step + 1;
  document.getElementById('question').innerHTML = questions[step].q;

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = "";

  questions[step].a.forEach(opt => {
    const el = document.createElement('label');
    el.innerHTML = `<input type="radio" name="q" value="${opt.v}"> ${opt.t}`;
    optionsDiv.appendChild(el);
  });

  // mid trigger na vraag 2
  if(step === 2){
    document.getElementById('trigger').innerText =
    "Dit is het punt waar de meeste organisaties het overzicht verliezen.";
  } else {
    document.getElementById('trigger').innerText = "";
  }

}

function next(){

  const selected = document.querySelector('input[name="q"]:checked');
  if(!selected) return;

  score += parseInt(selected.value);

  step++;

  if(step < questions.length){
    render();
  } else {
    window.location.href = "/scan/resultaat/?score=" + score;
  }

}

render();

</script>

</body>
</html>
